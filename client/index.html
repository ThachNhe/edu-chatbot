<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FC2 ChatBot</title>
    <link rel="stylesheet" href="/client/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>

    <!-- LOGIN UI -->
    <div id="login-view" style="display:none;">
      <div class="login-card">
        <div class="logo">FC2 ChatBot</div>
        <p class="subtitle">You must log in with your FC2ID.</p>
        <a id="login-btn" class="login-btn" href="#" target="_blank">Login with FC2ID</a>
        <p class="note">After logging in, reload this page.</p>
      </div>
    </div>

    <!-- CHAT UI -->
    <div id="chat-view" style="display:none;">
      <div class="wrapper">
        <div class="header-bar">FC2 ChatBot</div>
        <div class="card">
          <div id="log"></div>
          <div class="input-wrap">
            <input id="input" placeholder="Message..." />
            <button id="send">⤴</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/client/app.js"></script>
  </body>
</html>
